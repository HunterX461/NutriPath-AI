<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NutriPath-AI | Live Data</title>
    <!-- Google Fonts for modern typography -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
    <!-- FontAwesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            --card-glass: rgba(255, 255, 255, 0.1);
            --card-border: rgba(255, 255, 255, 0.2);
            --text-main: #ffffff;
            --text-muted: #cfd8dc;
            --accent-glow: #00d2ff;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg-gradient);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
            color: var(--text-main);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        @keyframes gradientShift { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        .container { max-width: 900px; width: 100%; text-align: center; }

        header { margin-bottom: 40px; }
        h1 { font-size: 3rem; margin: 0; font-weight: 700; text-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        p.subtitle { font-size: 1.3rem; color: var(--text-muted); margin-top: 10px; font-weight: 300; }

        .dashboard {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
            display: none;
            animation: fadeInRise 0.6s cubic-bezier(0.2, 0.8, 0.2, 1);
            text-align: left;
        }

        .glass-card {
            background: var(--card-glass);
            border: 1px solid var(--card-border);
            backdrop-filter: blur(12px);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 8px 32px 0 rgba(0,0,0,0.3);
        }

        .glass-card h3 { margin-top: 0; font-weight: 500; font-size: 1.1rem; color: var(--text-muted); display: flex; align-items: center; gap: 10px; }
        .metric-value { font-size: 2.2rem; font-weight: 700; margin: 15px 0; color: var(--accent-glow); }

        .recommendation-card { grid-column: 1 / -1; background: rgba(0, 210, 255, 0.15); text-align: center; }
        .res-action { font-size: 2rem; font-weight: 700; margin-bottom: 15px; text-shadow: 0 2px 10px rgba(0,210,255, 0.4); }
        .res-logic { font-size: 1.2rem; color: #e0e0e0; font-weight: 300; line-height: 1.6; max-width: 80%; margin: 0 auto; }

        button {
            color: white; border: none; border-radius: 50px; padding: 20px 50px; font-size: 1.5rem; font-family: inherit; font-weight: 700;
            cursor: pointer; box-shadow: 0 10px 20px rgba(0,0,0,0.2); transition: all 0.3s;
        }
        
        button.btn-primary { background: linear-gradient(45deg, #00c6ff, #0072ff); }
        button.btn-primary:hover { transform: translateY(-5px) scale(1.02); box-shadow: 0 15px 25px rgba(0, 114, 255, 0.4); }

        button.btn-google { background: white; color: #333; display: none; align-items: center; justify-content: center; gap: 10px; margin: 0 auto; }
        button.btn-google:hover { transform: translateY(-3px); box-shadow: 0 8px 15px rgba(255,255,255,0.2); }

        }
        .loader-wrapper { display: none; margin: 40px 0; }
        .spinner { width: 50px; height: 50px; border: 4px solid var(--card-border); border-top: 4px solid var(--accent-glow); border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 20px auto; }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes fadeInRise { 0% { opacity: 0; transform: translateY(30px); } 100% { opacity: 1; transform: translateY(0); } }

    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>NutriPath AI</h1>
            <p class="subtitle">Biological Intelligence for Daily Peak Performance (LIVE DATA)</p>
        </header>

        <div class="controls">
            <button id="login-btn" class="btn-google" onclick="window.location.href='/auth/login'">
                <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" alt="Google" width="24" height="24">
                Connect Google Account
            </button>
            
            <button id="analyze-btn" class="btn-primary" style="display: none;" onclick="startAnalysis()">
                <i class="fa-solid fa-bolt"></i> Analyze Real Biometrics
            </button>
        </div>

        <div class="loader-wrapper" id="loader">
            <div class="spinner"></div>
            <p style="font-size: 1.2rem; color: var(--text-muted);" id="loader-text">Synchronizing Real Live Data...</p>
        </div>

        <div class="dashboard" id="dashboard">
            <div class="glass-card">
                <h3><i class="fa-solid fa-heart-pulse"></i> Sensor Readiness</h3>
                <div class="metric-value" id="val-readiness">--%</div>
                <p style="color: var(--text-muted); margin:0;">Real-time health proxy</p>
            </div>

            <div class="glass-card">
                <h3><i class="fa-regular fa-calendar-check"></i> Actual Google Calendar</h3>
                <div class="metric-value" style="font-size: 1.4rem; color: #ffb74d;" id="val-stress">--</div>
                <p style="color: var(--text-muted); margin:0;">Your Location: <span id="val-location">--</span></p>
            </div>

            <div class="glass-card recommendation-card">
                <h3><i class="fa-solid fa-robot"></i> Live Recommended Protocol</h3>
                <div class="res-action" id="res-action">Generating...</div>
                <div class="res-logic" id="res-logic">Analyzing metrics...</div>
            </div>
        </div>
    </div>

    <script>
        // Check Auth Status on Load
        window.onload = async function() {
            try {
                const res = await fetch('/auth/status');
                const data = await res.json();
                if (data.authenticated) {
                    document.getElementById('analyze-btn').style.display = 'inline-block';
                } else {
                    document.getElementById('login-btn').style.display = 'flex';
                }
            } catch (e) {
                console.error("Auth check failed", e);
                document.getElementById('login-btn').style.display = 'flex';
            }
        };

        function startAnalysis() {
            document.getElementById('analyze-btn').style.display = 'none';
            document.getElementById('dashboard').style.display = 'none';
            document.getElementById('loader').style.display = 'block';
            document.getElementById('loader-text').innerText = "Acquiring GPS location...";

            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        const locString = `Lat: ${position.coords.latitude.toFixed(2)}, Lng: ${position.coords.longitude.toFixed(2)}`;
                        fetchRecommendation(locString);
                    },
                    (error) => {
                        console.warn("Location denied, fetching without it.");
                        fetchRecommendation("Location Access Denied");
                    }
                );
            } else {
                fetchRecommendation("Geolocation Unsupported");
            }
        }

        async function fetchRecommendation(locationStr) {
            document.getElementById('loader-text').innerText = "Querying Live Google Calendar & API...";
            try {
                const response = await fetch('/api/recommendation', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ location: locationStr })
                });

                if (response.status === 401) {
                    alert("Your Google session expired. Please reconnect.");
                    window.location.href = '/auth/login';
                    return;
                }
                if (!response.ok) throw new Error('API Error');

                const data = await response.json();

                // Populate Biometric Dashboard
                document.getElementById('val-readiness').innerText = (data.state.READINESS * 100).toFixed(0) + '%';
                document.getElementById('val-stress').innerText = data.state.STRESS_LOAD;
                document.getElementById('val-location').innerText = data.state.LOCATION_CONTEXT;

                // Color code readiness
                const readinessColor = data.state.READINESS > 0.7 ? '#69f0ae' : (data.state.READINESS > 0.4 ? '#ffd54f' : '#ff5252');
                document.getElementById('val-readiness').style.color = readinessColor;

                // Populate AI Recommendation
                document.getElementById('res-action').innerText = data.recommendation.action;
                document.getElementById('res-logic').innerText = data.recommendation.logic;

                // Reveal Dashboard
                document.getElementById('loader').style.display = 'none';
                document.getElementById('dashboard').style.display = 'grid';
                
                setTimeout(() => {
                    document.getElementById('analyze-btn').innerHTML = '<i class="fa-solid fa-rotate-right"></i> Refresh Live Data';
                    document.getElementById('analyze-btn').style.display = 'inline-block';
                }, 1000);

            } catch (error) {
                console.error("Analysis Failed:", error);
                alert("Failed to analyze live data.");
                document.getElementById('loader').style.display = 'none';
                document.getElementById('analyze-btn').style.display = 'inline-block';
            }
        }
    </script>
</body>
</html>
